name: Sweep 13F

on:
  workflow_dispatch:

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run 13F sweep
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python sweep_13f.py
